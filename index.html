<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>축의금 등록</title>
<style>
  :root{
    --bg:#FAF6F1;
    --card:#FFFFFF;
    --ink:#3A3532;
    --ink-soft:#7A736C;
    --line:#E8DFD6;
    --rose:#B8677A;
    --rose-deep:#8F4B5C;
    --sage:#8B9574;
    --rose-tint:#F5E8EA;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Apple SD Gothic Neo','Malgun Gothic',-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:480px;
    margin:0 auto;
    padding:0 0 60px;
  }

  /* 헤더 */
  .header{
    text-align:center;
    padding:28px 20px 20px;
  }
  .header .eyebrow{
    font-size:11px;
    letter-spacing:2px;
    color:var(--rose);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .header h1{
    font-family:'Noto Serif KR','Nanum Myeongjo',serif;
    font-weight:600;
    font-size:24px;
    color:var(--rose-deep);
    margin-bottom:4px;
  }
  .header p{
    font-size:12px;
    color:var(--ink-soft);
  }

  /* 탭 */
  .tab-bar{
    display:grid;
    grid-template-columns:1fr 1fr;
    border-bottom:2px solid var(--line);
    margin-bottom:20px;
    position:sticky;
    top:0;
    background:var(--bg);
    z-index:10;
  }
  .tab-btn{
    padding:13px;
    border:none;
    background:none;
    font-size:14px;
    font-weight:700;
    color:var(--ink-soft);
    cursor:pointer;
    border-bottom:2px solid transparent;
    margin-bottom:-2px;
    transition:color .15s;
  }
  .tab-btn.active{
    color:var(--rose-deep);
    border-bottom-color:var(--rose-deep);
  }

  /* 탭 패널 */
  .tab-panel{ display:none; padding:0 20px; }
  .tab-panel.active{ display:block; }

  /* 폼 카드 */
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:22px 20px;
    margin-bottom:16px;
  }
  .field{ margin-bottom:18px; }
  .field label{
    display:block;
    font-size:13px;
    font-weight:700;
    margin-bottom:8px;
    color:var(--ink);
  }
  .field label .opt{
    font-weight:400;
    color:var(--ink-soft);
    font-size:12px;
  }
  input[type=text],input[type=number]{
    width:100%;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:10px;
    font-size:15px;
    color:var(--ink);
    background:#fff;
  }
  input[type=text]:focus,input[type=number]:focus{
    outline:none;
    border-color:var(--rose);
  }
  .btn-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-bottom:10px;
  }
  .chip{
    padding:12px 4px;
    border:1px solid var(--line);
    background:#fff;
    border-radius:10px;
    font-size:14px;
    font-weight:700;
    color:var(--ink);
    text-align:center;
    cursor:pointer;
    user-select:none;
    transition:transform .08s;
  }
  .chip:active{transform:scale(0.95);background:var(--rose-tint);}
  .amount-display,.ticket-display{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    background:var(--rose-tint);
    border-radius:10px;
    padding:14px 16px;
    margin-bottom:10px;
  }
  .amount-display .num{
    font-size:22px;
    font-weight:700;
    color:var(--rose-deep);
  }
  .ticket-display .num{
    font-size:22px;
    font-weight:700;
    color:var(--sage);
  }
  .amount-display .lbl,.ticket-display .lbl{
    font-size:12px;
    color:var(--ink-soft);
  }
  .row-btn{ display:flex; gap:8px; }
  .row-btn button{
    flex:1;
    padding:9px;
    border:1px solid var(--line);
    background:#fff;
    border-radius:8px;
    font-size:12px;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .row-btn button:active{ background:#f2eee9; }
  .manual-row{ display:flex; gap:8px; margin-top:8px; }
  .manual-row input{ flex:1; }
  .manual-row button{
    padding:0 14px;
    border:1px solid var(--line);
    background:#fff;
    border-radius:8px;
    font-size:12px;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .submit-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:var(--rose-deep);
    color:#fff;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    margin-top:6px;
  }
  .submit-btn:disabled{ background:#cbb6ba; cursor:not-allowed; }
  .status-msg{
    text-align:center;
    font-size:13px;
    margin-top:12px;
    min-height:18px;
  }
  .status-msg.ok{ color:var(--sage); }
  .status-msg.err{ color:#B8474A; }

  /* 요약 */
  .summary-bar{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
    margin-bottom:16px;
  }
  .summary-box{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:12px;
    text-align:center;
  }
  .summary-box .n{
    font-size:17px;
    font-weight:700;
    color:var(--rose-deep);
  }
  .summary-box .l{
    font-size:10px;
    color:var(--ink-soft);
    margin-top:2px;
  }

  /* 새로고침 */
  .refresh-row{
    display:flex;
    justify-content:flex-end;
    margin-bottom:8px;
  }
  .refresh-row button{
    border:none;
    background:none;
    color:var(--rose);
    font-size:12px;
    cursor:pointer;
  }

  /* 리스트 카드 */
  .entry-wrap{
    position:relative;
    border-radius:12px;
    margin-bottom:8px;
    overflow:hidden;
  }
  .entry-actions{
    position:absolute;
    top:0; right:0; bottom:0;
    display:flex;
  }
  .entry-actions button{
    width:80px;
    border:none;
    font-size:12px;
    font-weight:700;
    color:#fff;
    cursor:pointer;
  }
  .entry-actions .act-delete{ background:#B8474A; }
  .entry{
    position:relative;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px 14px;
    display:flex;
    align-items:center;
    gap:12px;
    touch-action:pan-y;
    transition:transform .18s ease;
  }
  .entry .seq{
    font-size:11px;
    font-weight:700;
    color:var(--rose);
    background:var(--rose-tint);
    border-radius:6px;
    width:26px;
    height:26px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .entry .mid{ flex:1; min-width:0; }
  .entry .mid .name{
    font-size:14px;
    font-weight:700;
    color:var(--ink);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .entry .mid .sub{
    font-size:11px;
    color:var(--ink-soft);
    margin-top:2px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .entry .right{ text-align:right; flex-shrink:0; }
  .entry .right .amt{
    font-size:14px;
    font-weight:700;
    color:var(--rose-deep);
  }
  .entry .right .tix{
    font-size:11px;
    color:var(--sage);
    margin-top:2px;
  }
  .empty{
    text-align:center;
    color:var(--ink-soft);
    font-size:13px;
    padding:40px 0;
  }
  .config-warn{
    background:#FDF3D6;
    border:1px solid #E9D28A;
    color:#7A5E12;
    font-size:12px;
    padding:10px 14px;
    border-radius:10px;
    margin-bottom:16px;
    line-height:1.5;
  }
  .divider{
    display:flex;
    align-items:center;
    gap:10px;
    margin:20px 0 14px;
    color:var(--rose);
    opacity:.5;
  }
  .divider::before,.divider::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--line);
  }
  .divider span{ font-size:11px; letter-spacing:1px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="eyebrow">Wedding Gift Book</div>
    <h1>축의금 명단</h1>
    <p>축하해주셔서 감사합니다 · 편하게 입력해주세요</p>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" id="tabRegister">✏️ 등록하기</button>
    <button class="tab-btn" id="tabList">📋 전체 명단</button>
  </div>

  <!-- 등록 탭 -->
  <div class="tab-panel active" id="panelRegister">

    <div id="configWarn" class="config-warn" style="display:none;">
      구글시트 연동 주소가 설정되지 않았어요.
    </div>

    <div class="card">
      <div class="field">
        <label>이름</label>
        <input type="text" id="inputName" placeholder="이름을 입력해주세요">
      </div>
      <div class="field">
        <label>소속 · 비고 <span class="opt">(선택)</span></label>
        <input type="text" id="inputAffil" placeholder="예: 신랑 사촌, OO회사 등">
      </div>
      <div class="field">
        <label>축의금</label>
        <div class="amount-display">
          <span class="lbl">현재 금액</span>
          <span class="num" id="amountOut">0원</span>
        </div>
        <div class="btn-grid">
          <div class="chip" data-amt="10000">+1만</div>
          <div class="chip" data-amt="50000">+5만</div>
          <div class="chip" data-amt="100000">+10만</div>
          <div class="chip" data-amt="200000">+20만</div>
          <div class="chip" data-amt="300000">+30만</div>
          <div class="chip" data-amt="500000">+50만</div>
        </div>
        <div class="row-btn">
          <button type="button" id="amtReset">초기화</button>
        </div>
        <div class="manual-row">
          <input type="number" id="amtManual" placeholder="직접 입력 (원)">
          <button type="button" id="amtManualBtn">적용</button>
        </div>
      </div>
      <div class="field">
        <label>식권</label>
        <div class="ticket-display">
          <span class="lbl">현재 매수</span>
          <span class="num" id="ticketOut">0장</span>
        </div>
        <div class="btn-grid">
          <div class="chip" data-tix="1">+1장</div>
          <div class="chip" data-tix="2">+2장</div>
          <div class="chip" data-tix="3">+3장</div>
        </div>
        <div class="row-btn">
          <button type="button" id="tixReset">초기화</button>
        </div>
        <div class="manual-row">
          <input type="number" id="tixManual" placeholder="직접 입력 (장)">
          <button type="button" id="tixManualBtn">적용</button>
        </div>
      </div>
      <button class="submit-btn" id="submitBtn">등록하기</button>
      <div class="status-msg" id="statusMsg"></div>
    </div>

    <div class="divider"><span>최근 등록</span></div>
    <div id="recentWrap"><div class="empty">아직 등록된 명단이 없어요</div></div>

  </div>

  <!-- 전체 명단 탭 -->
  <div class="tab-panel" id="panelList">

    <div class="summary-bar">
      <div class="summary-box">
        <div class="n" id="sumCount">0명</div>
        <div class="l">등록 인원</div>
      </div>
      <div class="summary-box">
        <div class="n" id="sumAmount">0원</div>
        <div class="l">총 축의금</div>
      </div>
      <div class="summary-box">
        <div class="n" id="sumTix">0장</div>
        <div class="l">총 식권</div>
      </div>
    </div>

    <div class="refresh-row">
      <button type="button" id="refreshBtn">↻ 새로고침</button>
    </div>

    <div id="listWrap"><div class="empty">아직 등록된 명단이 없어요</div></div>

  </div>

</div>

<script>
  const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbzjAzhS1qaXLBXWKQCn8zR-AiLpGPjVu19uYWCbrOjpBwH5oAwCBhzrfxsXw7frbGPYIg/exec";

  const MAX_AMOUNT = 10000000;
  const MAX_TICKETS = 100;

  let amount = 0;
  let tickets = 0;
  let openEntry = null;
  let currentData = [];

  const amountOut    = document.getElementById('amountOut');
  const ticketOut    = document.getElementById('ticketOut');
  const statusMsg    = document.getElementById('statusMsg');
  const submitBtn    = document.getElementById('submitBtn');
  const listWrap     = document.getElementById('listWrap');
  const recentWrap   = document.getElementById('recentWrap');
  const sumCount     = document.getElementById('sumCount');
  const sumAmount    = document.getElementById('sumAmount');
  const sumTix       = document.getElementById('sumTix');
  const inputName    = document.getElementById('inputName');
  const inputAffil   = document.getElementById('inputAffil');

  if (!SHEET_API_URL || SHEET_API_URL.indexOf('PASTE_YOUR') === 0) {
    document.getElementById('configWarn').style.display = 'block';
  }

  // 탭 전환
  document.getElementById('tabRegister').addEventListener('click', () => switchTab('register'));
  document.getElementById('tabList').addEventListener('click', () => {
    switchTab('list');
    loadList();
  });

  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    if (name === 'register') {
      document.getElementById('tabRegister').classList.add('active');
      document.getElementById('panelRegister').classList.add('active');
    } else {
      document.getElementById('tabList').classList.add('active');
      document.getElementById('panelList').classList.add('active');
    }
  }

  function fmtWon(n){ return Number(n).toLocaleString('ko-KR') + '원'; }

  function renderAmount(){ amountOut.textContent = fmtWon(amount); }
  function renderTicket(){ ticketOut.textContent = tickets.toLocaleString('ko-KR') + '장'; }

  document.querySelectorAll('[data-amt]').forEach(el => {
    el.addEventListener('click', () => {
      amount = Math.min(MAX_AMOUNT, amount + parseInt(el.dataset.amt, 10));
      renderAmount();
    });
  });
  document.querySelectorAll('[data-tix]').forEach(el => {
    el.addEventListener('click', () => {
      tickets = Math.min(MAX_TICKETS, tickets + parseInt(el.dataset.tix, 10));
      renderTicket();
    });
  });

  document.getElementById('amtReset').addEventListener('click', () => { amount = 0; renderAmount(); });
  document.getElementById('tixReset').addEventListener('click', () => { tickets = 0; renderTicket(); });

  document.getElementById('amtManualBtn').addEventListener('click', () => {
    const v = parseInt(document.getElementById('amtManual').value, 10);
    if (!isNaN(v) && v >= 0) { amount = Math.min(MAX_AMOUNT, v); renderAmount(); document.getElementById('amtManual').value = ''; }
  });
  document.getElementById('tixManualBtn').addEventListener('click', () => {
    const v = parseInt(document.getElementById('tixManual').value, 10);
    if (!isNaN(v) && v >= 0) { tickets = Math.min(MAX_TICKETS, v); renderTicket(); document.getElementById('tixManual').value = ''; }
  });

  function setStatus(msg, type) {
    statusMsg.textContent = msg;
    statusMsg.className = 'status-msg' + (type ? ' ' + type : '');
  }

  async function submitEntry() {
    const name = inputName.value.trim();
    const affil = inputAffil.value.trim();
    if (!name) { setStatus('이름을 입력해주세요', 'err'); return; }

    submitBtn.disabled = true;
    setStatus('등록 중...', '');
    try {
      const params = new URLSearchParams({
        action: 'create',
        name: name,
        affiliation: affil,
        amount: amount,
        tickets: tickets
      });
      await fetch(SHEET_API_URL + '?' + params.toString(), { method: 'GET', mode: 'no-cors' });
      setStatus('등록되었습니다 🌿', 'ok');
      inputName.value = ''; inputAffil.value = '';
      amount = 0; tickets = 0;
      renderAmount(); renderTicket();
      await loadList();
    } catch(err) {
      setStatus('등록에 실패했어요. 다시 시도해주세요', 'err');
    } finally {
      submitBtn.disabled = false;
    }
  }

  submitBtn.addEventListener('click', submitEntry);

  async function loadList() {
    try {
      const res = await fetch(SHEET_API_URL + '?action=list', { method: 'GET' });
      const data = await res.json();
      currentData = Array.isArray(data) ? data.sort((a,b) => (Number(a.seq)||0) - (Number(b.seq)||0)) : [];
      renderSummary(currentData);
      renderFullList(currentData);
      renderRecent(currentData);
    } catch(err) {}
  }

  function renderSummary(data) {
    let totalAmt = 0, totalTix = 0;
    data.forEach(r => { totalAmt += Number(r.amount)||0; totalTix += Number(r.tickets)||0; });
    sumCount.textContent = data.length.toLocaleString('ko-KR') + '명';
    sumAmount.textContent = (totalAmt / 10000).toLocaleString('ko-KR') + '만원';
    sumTix.textContent = totalTix.toLocaleString('ko-KR') + '장';
  }

  // 등록탭 하단 최근 5건
  function renderRecent(data) {
    const recent = data.slice(0, 5);
    if (!recent.length) {
      recentWrap.innerHTML = '<div class="empty">아직 등록된 명단이 없어요</div>';
      return;
    }
    recentWrap.innerHTML = '';
    recent.forEach((row, i) => recentWrap.appendChild(buildEntryEl(row, i + 1)));
  }

  // 전체 명단 탭
  function renderFullList(data) {
    openEntry = null;
    if (!data.length) {
      listWrap.innerHTML = '<div class="empty">아직 등록된 명단이 없어요</div>';
      return;
    }
    listWrap.innerHTML = '';
    data.forEach((row, i) => listWrap.appendChild(buildEntryEl(row, i + 1)));
  }

  function buildEntryEl(row, displaySeq) {
    const amt  = Number(row.amount) || 0;
    const tix  = Number(row.tickets) || 0;
    const affil = row.affiliation || '';
    const seq  = row.seq || '-';

    const wrap = document.createElement('div');
    wrap.className = 'entry-wrap';
    wrap.innerHTML = `
      <div class="entry-actions">
        <button type="button" class="act-delete">삭제</button>
      </div>
      <div class="entry">
        <div class="seq">${displaySeq}</div>
        <div class="mid">
          <div class="name">${escapeHtml(row.name || '')}</div>
          <div class="sub">${escapeHtml(affil)}</div>
        </div>
        <div class="right">
          <div class="amt">${fmtWon(amt)}</div>
          <div class="tix">식권 ${tix}장</div>
        </div>
      </div>
    `;
    const entryEl = wrap.querySelector('.entry');
    attachSwipe(entryEl, 80);
    wrap.querySelector('.act-delete').addEventListener('click', () => deleteEntry(row));
    return wrap;
  }

  function closeOpenEntry() {
    if (openEntry) { openEntry.style.transform = 'translateX(0)'; openEntry = null; }
  }

  function attachSwipe(entryEl, actionsWidth) {
    let startX = 0, currentX = 0, dragging = false;
    function onStart(x) {
      if (openEntry && openEntry !== entryEl) closeOpenEntry();
      startX = x; dragging = true;
      entryEl.style.transition = 'none';
    }
    function onMove(x) {
      if (!dragging) return;
      currentX = Math.min(0, Math.max(-actionsWidth, x - startX));
      entryEl.style.transform = 'translateX(' + currentX + 'px)';
    }
    function onEnd() {
      if (!dragging) return;
      dragging = false;
      entryEl.style.transition = 'transform .18s ease';
      if (currentX < -actionsWidth / 2) {
        entryEl.style.transform = 'translateX(-' + actionsWidth + 'px)';
        openEntry = entryEl;
      } else {
        entryEl.style.transform = 'translateX(0)';
        if (openEntry === entryEl) openEntry = null;
      }
      currentX = 0;
    }
    entryEl.addEventListener('touchstart', e => onStart(e.touches[0].clientX), { passive: true });
    entryEl.addEventListener('touchmove',  e => onMove(e.touches[0].clientX),  { passive: true });
    entryEl.addEventListener('touchend', onEnd);
    entryEl.addEventListener('mousedown', e => { onStart(e.clientX); e.preventDefault(); });
    window.addEventListener('mousemove', e => onMove(e.clientX));
    window.addEventListener('mouseup', onEnd);
  }

  async function deleteEntry(row) {
    if (!confirm(row.name + '님 명단을 삭제할까요?')) return;
    currentData = currentData.filter(r => r.seq !== row.seq);
    renderSummary(currentData);
    renderFullList(currentData);
    renderRecent(currentData);
    try {
      const params = new URLSearchParams({ action: 'delete', seq: row.seq });
      await fetch(SHEET_API_URL + '?' + params.toString(), { method: 'GET', mode: 'no-cors' });
    } catch(err) {
      alert('삭제 처리 중 오류가 발생했어요. 새로고침 후 다시 확인해주세요');
      await loadList();
    }
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('refreshBtn').addEventListener('click', loadList);

  renderAmount();
  renderTicket();
  loadList();
</script>
</body>
</html>
